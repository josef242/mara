[pytest]
testpaths = tests
norecursedirs = manual
addopts = -ra
markers =
    gpu: requires CUDA (auto-skipped when torch.cuda.is_available() is False)
    slow: takes >60s; deselect with -m "not slow"
    dist: requires torchrun / multi-process; skipped unless RUN_DIST=1
    legacy: subprocess wrapper around a pre-suite standalone test script
filterwarnings =
    ignore::DeprecationWarning
