# dn4 — "DN3 BEHAVIOR, WITHOUT THE HEAD EXPLOSION". FRESH FROM SCRATCH: LATE grow-then-clamp body +
# the shadow-norm pdr controller (no-handoff, acts-on-attn) + preventive head-gauge hygiene from step 0.
#
# HEAD THESIS (Q10 / DN4_HEAD_HYGIENE_SPEC, Math-approved): DN2's head grew +221% (~78% a CE-invisible
# common-mode gauge), and BOTH late fixes FAILED as retrofits at step 18000 (z-loss needed a 330x alpha
# cut then was dropped; row-center destabilized). dn4 tests whether the SAME hygiene applied PREVENTIVELY
# from step 0 keeps the head near its healthy birth geometry: Lever 1 (head gauge projection) on
# throughout, row-center/raw-z-loss OFF, Lever 2 (deadband centered z-loss) built-but-staged-off.
#
# BODY THESIS (updated 2026-07-01, from the skiff-overlay proof): continued body growth is a POWERFUL
# REGULARIZER that HELPS learning through the first quarter+ — so let the body grow freely, then clamp it
# LATE and GENTLY (the body is NOT the runaway; the HEAD is). Recipe = grow freely 0-12k (~9B tokens),
# anneal f 0->1 over 12k-24k (~9B->~49B tokens), FROZEN 24k+, under the shadow-norm controller:
# m = median(R/S)^g (no anchor/knots/warmup), NO-HANDOFF continuous anneal past f=1 (no LR-track kink),
# acts_on_attn (same m to attn -> preserves the attn<->ffn pdr lock-step), modest glide g=1.25,
# radial-budget body WD. Skiff-overlay (rig-31) reproduced the picket-hyg overlay for BOTH attn+ffn at
# healthy loss — the definitive proof this controls body+head growth without damaging learning.
#
# Validate cheaply FIRST with the skiff canaries before committing a big rig to this 200k-step marathon.
run_name: dn4

# ===== identical to DN2 (arch / data / optimizer / schedules) =====
ga_schedule:
  - [0, 125_000]
  - [2_000, 250_000]
  - [4_000, 500_000]
  - [7_000, 1_000_000]
  - [10_500, 2_000_000]
  - [14_500, 3_000_000]
  - [17_000, 4_000_000]
B: 12
T: 2048
max_steps: 200_000
eval_iters: 2
val_step: 100
save_step: 250

data_type: bf16
FSDP_param_dtype: bf16
FSDP_reduce_dtype: bf16
FSDP_buffer_dtype: bf16
reshard_after_forward: true

# FRESH FROM SCRATCH (the whole point — preventive, not a retrofit on a grown head).
resume_training: true
resume_step: 1_750
resume_data_reset: continue

clip_warmup: 2.0
clip_standard: 1.5
track_gpm: true
track_clip_groups: true

use_keel: true
keel_alpha: null
# cfg_layers: 80
# cfg_heads: 40
# cfg_kv_heads: 20
# cfg_embd: 2560
# cfg_intermediate: 5120

cfg_layers: 101
cfg_heads: 32
cfg_kv_heads: 16
cfg_embd: 2048
cfg_intermediate: 5120

norm_eps: 1.0e-05
dropout: 0.0
use_activation_checkpointing: true
qk_norm_mode: "before_rope"
tie_word_embeddings: false      # untied — required for the head levers (and DN2's setting)
rope_theta: 500_000.0
moe_enabled: false

compile_model: true
compile_mode: default

lr_schedule_type: "cosine"
max_lr: 3.0e-04
min_lr: 3.0e-05
warmup_steps: 2000

optimizer_type: normuon_fsdp2
beta1: 0.9
beta2: 0.95
# body WD: the shadow controller OWNS the FFN body WD via the radial-budget law (lambda = clamp(0.002,
# 0.02, rho(1-f)*gamma_EMA)) -> high while radial growth is alive, auto-tapering to 0.002 as f->1. No hand
# taper. The flat [all, 0.002] base stands for attn (acts_on_attn scales attn's LR but NOT its WD) and the
# brief pre-engagement window. emb/head pinned 0.02 (NOT tangent-projected; NO aggressive head-WD DO-NOT).
weight_decay:
  - [emb, 0.02]
  - [out, 0.02]
  - [all, 0.002]
muon_momentum: 0.95
muon_ns_steps: 5
normuon_beta2: 0.99
muon_adam_state_dtype: fp32     # required by head_gauge_projection (non-fused Adam path)

# output_lr_batch_adjust: REMOVED. It was a head-LR brake (base_mult 0.8x) PLUS a batch-driven head-LR
# reduction (active here — the GA ramps 32x) — both crude proxies for curbing head growth by slowing the
# head. With head_gauge_projection (Lever 1) now the real, function-preserving head-growth control, this
# whole head-LR manipulation is an outmoded crutch. Removed -> the head trains at FULL LR and hygiene does
# the controlling. (Validated free + harmless by the picket A/B: gauge held ~0 at token-for-token loss.)

# ===== body recipe: LATE grow-then-clamp (body growth helps early -> grow freely, then clamp late) =====
# Grow freely 0-12k (~9B tokens; bank the regularization benefit), anneal f 0->1 over 12k-24k (~9B->~49B
# tokens; grow decreasingly, then lock), FROZEN 24k-200k. Terminal f=1.0 required for growth mode.
tangent_project: true
tangent_project_preserve_norm: false
tangent_project_strength: [[0, 0.0], [12_000, 0.0], [24_000, 1.0]]

# Shadow-norm FFN pdr controller: m = median(R/S)^g constructed online (no anchor/knots/warmup) — R is the
# actual ||W||, S the counterfactual free-growth norm. Idles m=1 while f=0, engages at first f>0 (step 12k).
# NO-HANDOFF: past f=1 it keeps commanding m=median(R/S) (continuous anneal, no LR-track kink). acts_on_attn
# broadcasts the SAME m to attn (wq/wk/wv/wo) so attn rides the free-growth glide too (keeps the attn<->ffn
# lock-step); attn keeps its flat base WD (radial-budget lambda is FFN-only). Modest glide (a little goes a
# long way over the 176k-step frozen tail). Requires an FSDP/DTensor body + tangent projection (both set).
ffn_pdr_controller:
  enabled: true
  m_min_full: 0.30           # f-aware floor base m_min(f)=1-f*(1-m_min_full); 0.30 (not 0.20) so the long
                             # no-handoff tail doesn't peg the body LR too low as S keeps outgrowing R
  m_max: 1.0                 # cuts-only (never amplify; fatal-guarded)
  rho: 0.20                  # WD radial-budget fraction (WD trims <=20% of remaining radial growth)
  lambda_max: 0.02           # WD ceiling (high while radial growth is alive)
  lambda_min: 0.002          # WD floor (residual once the body is clamped)
  k_ema_alpha: 0.25
  rate_down: 0.05
  rate_up: 0.02
  glide_gain: 1.25           # modest cut (a little goes a long way; steeper would peg m at the floor early)
  freeze_handoff: false       # NO-HANDOFF: R/S continues past f=1 -> continuous anneal, no kink
  acts_on_attn: true          # same m to attn (wq/wk/wv/wo); attn keeps flat WD
  reference:
    mode: auto_shadow_growth

# Auxiliary heads: OFF. They were tried (DN2) to relieve the main head's readout load / head growth
# and did NOT tame it -- DN2's head ACCELERATED inside the aux-head-active window (Q10). dn4 is the
# clean head-hygiene test, so we drop the failed-at-head-control mechanism rather than confound the
# run with another head-related intervention. (Trade-off: forgoes any representational benefit of
# distributing readout pressure across depth; acceptable for an isolation experiment.)
auxiliary_heads:
  enabled: false

# ===== dn4 head hygiene =====
# Lever 1: head applied-update gauge projection, ON from step 0 (the preventive intervention).
head_gauge_projection:
  enabled: true
  init_row_center: true         # one-time weight-only gauge clean at step 1 (clean birth head)

# Lever 2: deadband centered z-loss — BUILT but STAGED OFF. Enable ONLY if telemetry shows logZ_c /
# eff_rank_c / rare-token behavior leaving the KEEL band. tau/alpha set from dn3's observed logZ_c
# band (Math reference ~tau 120-128; alpha ~24x raw since centered penalizes logZ_c~108 not ~500).
z_loss:
  enabled: false
  target: centered
  tau: 128
  alpha: 1.0e-5
  backend: fp32_accum

# Legacy row-center (the failed retrofit) OFF — head_gauge_projection replaces it, and they are
# mutually exclusive. Raw z-loss is the 'enabled: false' above.
row_center_head:
  enabled: false

transition_health_guard: true

tok_kind: llama
tok_path: ../tokenizers/llama_tokenizer
special_tokens: ../../notebooks/datasets/tokenized/llama/tokenizer_config.json
data_root_path: ../../notebooks/datasets/tokenized/llama/
groups:
  #  - [stories,      [[0, 100.0]]]
  - [stories,      [[0, 28.0]]]
  - [ao3,          [[0, 12.0]]]
  - [books,        [[0, 28.0]]]
  - [preselect,    [[0, 11.0]]]
  - [code_python,  [[0, 6.0]]]
  - [code_c,       [[0, 6.0]]]
  - [edufineweb_1.5TT, [[0, 9.0]]]

gen_log_file: gen_log.txt
train_log_file: train_log.txt
val_log_file: val_log.txt
server_port: 8888

nas_root: /home/josef/brainbox/checkpoints/current/
local_checkpoint_root: ~/checkpoints/
