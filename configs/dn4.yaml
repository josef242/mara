# dn4 — "PREVENTIVE HEAD HYGIENE". DN2's recipe, FRESH FROM SCRATCH, with the dn4 head levers ON
# from step 0 instead of bolted on as late retrofits.
#
# The dn4 thesis (Q10 / DN4_HEAD_HYGIENE_SPEC, Math-approved): DN2's head grew +221% (≈78% a
# CE-invisible common-mode gauge), and BOTH of its late fixes FAILED as retrofits at step 18000
# (z-loss needed a 330x alpha cut then was dropped; row-center destabilized). The open question is
# whether the SAME hygiene, applied PREVENTIVELY from step 0, simply keeps the head near its healthy
# birth geometry. dn4 is that test: identical to DN2 in arch/data/schedules/aux-heads, but a fresh
# run with Lever 1 (head gauge projection) on throughout, row-center/raw-z-loss OFF, and Lever 2
# (deadband centered z-loss) built-but-staged-off.
#
# Validate cheaply FIRST with the picket-ctrl/picket-hyg canary (rig-31, parallel to dn3) before
# committing a big rig to this marathon. BODY RECIPE: dn4 keeps DN2's GROWING body (no tangent
# projection) to isolate the HEAD variable (dn3 is separately settling body control). If the team
# adopts tangent projection as the default body recipe post-dn3, layer it in here.
run_name: dn4

# ===== identical to DN2 (arch / data / optimizer / schedules) =====
ga_schedule:
  - [0, 125_000]
  - [2_000, 250_000]
  - [4_000, 500_000]
  - [7_000, 1_000_000]
  - [10_500, 2_000_000]
  - [14_500, 3_000_000]
  - [17_000, 4_000_000]
B: 3
T: 8192
max_steps: 200_000
eval_iters: 2
val_step: 100
save_step: 250

data_type: bf16
FSDP_param_dtype: bf16
FSDP_reduce_dtype: bf16
FSDP_buffer_dtype: bf16
reshard_after_forward: true

# FRESH FROM SCRATCH (the whole point — preventive, not a retrofit on a grown head).
resume_training: false

clip_warmup: 2.0
clip_standard: 1.0
track_gpm: true
track_clip_groups: true

use_keel: true
keel_alpha: null
cfg_layers: 69
cfg_heads: 40
cfg_kv_heads: 20
cfg_embd: 2560
cfg_intermediate: 7680
norm_eps: 1.0e-05
dropout: 0.0
use_activation_checkpointing: true
qk_norm_mode: "before_rope"
tie_word_embeddings: false      # untied — required for the head levers (and DN2's setting)
rope_theta: 500_000.0
moe_enabled: false

compile_model: true
compile_mode: default

lr_schedule_type: "cosine"
max_lr: 3.0e-04
min_lr: 3.0e-05
warmup_steps: 2000

optimizer_type: normuon_fsdp2
beta1: 0.9
beta2: 0.95
weight_decay: 0.02              # DN2's value. NO aggressive head-WD (the v1-incoherence DO-NOT).
muon_momentum: 0.95
muon_ns_steps: 5
normuon_beta2: 0.99
muon_adam_state_dtype: fp32     # required by head_gauge_projection (non-fused Adam path)

output_lr_batch_adjust:         # DN2's head-LR pacing (NOT a brake — keep)
  base_mult: 0.8
  exponent: 0.3

# Auxiliary heads: OFF. They were tried (DN2) to relieve the main head's readout load / head growth
# and did NOT tame it -- DN2's head ACCELERATED inside the aux-head-active window (Q10). dn4 is the
# clean head-hygiene test, so we drop the failed-at-head-control mechanism rather than confound the
# run with another head-related intervention. (Trade-off: forgoes any representational benefit of
# distributing readout pressure across depth; acceptable for an isolation experiment.)
auxiliary_heads:
  enabled: false

# ===== dn4 head hygiene =====
# Lever 1: head applied-update gauge projection, ON from step 0 (the preventive intervention).
head_gauge_projection:
  enabled: true
  init_row_center: true         # one-time weight-only gauge clean at step 1 (clean birth head)

# Lever 2: deadband centered z-loss — BUILT but STAGED OFF. Enable ONLY if telemetry shows logZ_c /
# eff_rank_c / rare-token behavior leaving the KEEL band. tau/alpha set from dn3's observed logZ_c
# band (Math reference ~tau 120-128; alpha ~24x raw since centered penalizes logZ_c~108 not ~500).
z_loss:
  enabled: false
  target: centered
  tau: 128
  alpha: 1.0e-5
  backend: fp32_accum

# Legacy row-center (the failed retrofit) OFF — head_gauge_projection replaces it, and they are
# mutually exclusive. Raw z-loss is the 'enabled: false' above.
row_center_head:
  enabled: false

transition_health_guard: true

tok_kind: llama
tok_path: ../tokenizers/llama_tokenizer
special_tokens: ../../notebooks/datasets/tokenized/llama/tokenizer_config.json
data_root_path: ../../notebooks/datasets/tokenized/llama/
groups:
  - [stories,      [[0, 25.0]]]
  - [ao3,          [[0, 25.0]]]
  - [books,        [[0, 25.0]]]
  - [preselect,    [[0, 7.0]]]
  - [code_python,  [[0, 6.0]]]
  - [code_c,       [[0, 6.0]]]
  - [edufineweb_1.5TT, [[0, 6.0]]]

gen_log_file: gen_log.txt
train_log_file: train_log.txt
val_log_file: val_log.txt
server_port: 8888

nas_root: /home/josef/brainbox/checkpoints/current/
local_checkpoint_root: ~/checkpoints/
