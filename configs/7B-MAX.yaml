# Configuration for 7.1B parameter model with Tiktoken and AdamC optimizer
run_name: 7B-MAX

# Training settings
ga_schedule:
  - [0, 655_360]
  - [4_333, 1_310_720]
  - [8_666, 2_621_440]
  - [13_000, 4_242_880]
B: 4                          # Batch size per GPU
T: 4096                       # Context size (sequence length)
max_steps: 200_000            # Maximum number of training steps
eval_iters: 4                 # Number of iterations for evaluation x ranks
val_step: 100                 # Validation step frequency in steps
save_step: 250                # Checkpoint saving frequency in steps

# Data type settings
data_type: bf16
FSDP_param_dtype: bf16
FSDP_reduce_dtype: bf16
FSDP_buffer_dtype: bf16

# Resume training settings
resume_training: true
resume_step: 16500
resume_data_reset: continue         # Modes are: continue (no reset), soft (reset pct window - change in pct), hard (reset all)

# Gradient clipping
clip_warmup: 1.0
clip_standard: 1.0                # for bf16 1.0 is recommended instead of the old 0.3-0.7

# Tokenizer settings
tok_kind: tiktoken
tok_path: cl100k_base

# Model architecture
cfg_layers: 38
cfg_heads: 40
cfg_embd: 3840
cfg_intermediate: 10240
multiple_of: 128
norm_eps: 1.0e-05
dropout: 0.0
use_activation_checkpointing: true
#qk_norm: true
qk_norm_mode: "after_rope_legacy"      # None, "before_rope", "after_rope_legacy", "after_rope_fixed"
tie_word_embeddings: true             # Whether to tie word embeddings - false gives a small boost in quality but increases model size

# Compilation settings
compile_model: true
compile_mode: reduce-overhead

# Learning rate schedule - Conservative Plateau with adjusted max_lr
lr_schedule_type: "plateau"       
max_lr: 4.0e-04                   # Higher max_lr for math only - model won't see this (trained on 3.0e-04 before)
min_lr: 4.0e-06                  
warmup_steps: 1000
# First plateau - conservative for continuous learning
decay_to_first_plat_pct: 0.08     # 16k steps to decay (1k to 17k)
first_plat_lr: 1.8e-04            # Conservative plateau (45% of configured max, 60% of original 3.0e-04)
first_plat_len_pct: 0.50          # 100k steps at plateau (17k to 117k)
# Second plateau - fine refinement
decay_to_second_pct: 0.10         # 20k steps to decay (117k to 137k)
second_plat_lr: 6.0e-05           # 20% of original 3.0e-04
second_plat_len_pct: 0.20         # 40k steps at plateau (137k to 177k)

# Optimizer settings
optimizer_type: adamc_8bit # See _optimizer_reference.yaml for details
beta1: 0.9
beta2: 0.95
weight_decay: 0.1

# Data configuration
data_root_path: ../../notebooks/datasets/tokenized/cl100k/
groups:
  - [stories, 35.0]           # Curated, fictional stories dataset
  - [ao3, 35.0]               # Archive of Our Own (AO3) fanfiction dataset - unfiltered
  - [preselect, 10.0]         # https://huggingface.co/datasets/hkust-nlp/PreSelect-100B
  - [code_python, 10.0]       # From: https://huggingface.co/datasets/bigcode/the-stack-dedup
  - [code_c, 10.0]            # From: https://huggingface.co/datasets/bigcode/the-stack-dedup
  - [fineweb-edu, 0.0]        # https://huggingface.co/datasets/HuggingFaceFW/fineweb-edu
  - [code_haskell, 0.0]       # From: https://huggingface.co/datasets/bigcode/the-stack-dedup
  #- [finepdfs-edu, 0.0]      # https://huggingface.co/datasets/HuggingFaceFW/finepdfs-edu
  #- [eai_stem, 0.0]          # https://huggingface.co/datasets/EssentialAI/eai-taxonomy-stem-w-fm
  #- [eai_math, 0.0]          # https://huggingface.co/datasets/EssentialAI/eai-taxonomy-math-w-fm
  #- [eai_med, 0.0]           # https://huggingface.co/datasets/EssentialAI/eai-taxonomy-med-w-fm
  #- [books, 0.0]             # book.jsonl from RedPajama-Data-1T https://huggingface.co/datasets/togethercomputer/RedPajama-Data-1T

# Logging settings
gen_log_file: gen_log.txt           # Will be saved in nas_root
train_log_file: train_log.txt       # Will be saved in nas_root
val_log_file: val_log.txt           # Will be saved in nas_root
# server_host: localhost            # Will be derived from ddp
server_port: 8888


# Checkpoint Paths
nas_root: ./log/                                                # Defaults to ./log/ if not specified
local_checkpoint_root: ~/checkpoints/                           # Defaults to ~/checkpoints/ if not specified
# nas_path: ./log/4B-T-AC/                                      # Automatically derived from nas_root/run_name - can be overridden
# resume_checkpoint_path: ./log/4B-T-AC/model_step_008500.pt    # Automatically derived from nas_root/run_name/model_step_resume_step - can be overridden
# local_checkpoint_dir: ~/checkpoints/4B-T-AC                   # Automatically derived from local_checkpoint_root/run_name - can be overridden
