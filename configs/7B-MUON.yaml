# Configuration for 7.1B parameter model with Tiktoken and AdamC optimizer
run_name: 7B-MUON-LRF

# Training settings
ga_schedule:
  - [0, 250_000]
  - [2_000, 500_000]
  - [4_000, 750_000]
  - [6_000, 1_000_000]
  - [8_000, 1_500_000]
  - [10_000, 2_000_000]
  - [12_000, 3_000_000]
  - [14_000, 4_000_000]
#B: 4                          # Batch size per GPU
#T: 4096                       # Context size (sequence length)
B: 2                          # Batch size per GPU
T: 8192                       # Context size (sequence length)
max_steps: 200_000            # Maximum number of training steps
eval_iters: 2                 # Number of iterations for evaluation x ranks
val_step: 100                 # Validation step frequency in steps
save_step: 250                # Checkpoint saving frequency in steps

# Data type settings
data_type: bf16
FSDP_param_dtype: bf16
FSDP_reduce_dtype: bf16
FSDP_buffer_dtype: bf16

# Resume training settings
resume_training: true
resume_step: 10500
resume_data_reset: continue         # Modes are: continue (no reset), soft (reset pct window - change in pct), hard (reset all)

# Gradient clipping
clip_warmup: 1.0
clip_standard: 1.0                # for bf16 1.0 is recommended instead of the old 0.3-0.7

# Tokenizer settings
tok_kind: tiktoken
tok_path: cl100k_base
special_tokens: ../../notebooks/datasets/tokenized/cl100k/tokenizer_config.json  # Optional: add conversation special tokens

# Model architecture
#cfg_layers: 38
cfg_layers: 42
cfg_heads: 40
cfg_kv_heads: 10                  # NEW SETTING
cfg_embd: 3840
#cfg_intermediate: 10240
cfg_intermediate: 11264
multiple_of: 128
norm_eps: 1.0e-05
dropout: 0.0
use_activation_checkpointing: true
#qk_norm: true
qk_norm_mode: "before_rope"       # None, "before_rope", "after_rope_legacy", "after_rope_fixed"
tie_word_embeddings: true         # Whether to tie word embeddings - false gives a small boost in quality but increases model size
rope_theta: 500000.0              # # NEW SETTING: RoPE base frequency (higher = longer context support)

# Compilation settings
compile_model: true
compile_mode: default

# Learning rate schedule - Conservative Plateau with adjusted max_lr
lr_schedule_type: "plateau"       
max_lr: 4.2e-04                   # Higher max_lr for math only - model won't see this (trained on 3.0e-04 before)
min_lr: 4.2e-05                   # 10% floor (Moonlight), was 1%                  
warmup_steps: 1000
# First plateau - conservative for continuous learning
decay_to_first_plat_pct: 0.08     # 16k steps to decay (1k to 17k)
first_plat_lr: 1.8e-04            # Conservative plateau (45% of configured max, 60% of original 3.0e-04)
first_plat_len_pct: 0.50          # 100k steps at plateau (17k to 117k)
# Second plateau - fine refinement
decay_to_second_pct: 0.10         # 20k steps to decay (117k to 137k)
second_plat_lr: 6.0e-05           # 20% of original 3.0e-04
second_plat_len_pct: 0.20         # 40k steps at plateau (137k to 177k)

# Optimizer settings
optimizer_type: normuon_fsdp2
beta1: 0.9
beta2: 0.95
weight_decay: 0.1
muon_momentum: 0.95
muon_ns_steps: 5
normuon_beta2: 0.99               # 0.95 - Aggressive, ~20 step window | 0.99 - Moderate, ~100 step window | 0.999 - Conservative, ~1000 step window

# Data configuration
data_root_path: ../../notebooks/datasets/tokenized/cl100k/
groups:
  - [stories,      [[0, 30.0], [10500, 30.0],[14000, 26.0]]]           # Curated, fictional stories dataset
  - [ao3,          [[0, 30.0], [10500, 30.0],[14000, 26.0]]]               # Archive of Our Own (AO3) fanfiction dataset - unfiltered
  - [preselect, 10.0]         # https://huggingface.co/datasets/hkust-nlp/PreSelect-100B
  - [code_python, 8.0]       # From: https://huggingface.co/datasets/bigcode/the-stack-dedup
  - [code_c, 8.0]            # From: https://huggingface.co/datasets/bigcode/the-stack-dedup
  - [books, 7.0]             # book.jsonl from RedPajama-Data-1T https://huggingface.co/datasets/togethercomputer/RedPajama-Data-1T
  - [eai_stem, 4.0]          # https://huggingface.co/datasets/EssentialAI/eai-taxonomy-stem-w-fm
  - [finepdfs-edu, 3.0]      # https://huggingface.co/datasets/HuggingFaceFW/finepdfs-edu
  - [mid_smoltalk, [[0, 0.0],[10500, 0.0],[14000, 4.0]]]        #
  - [fineweb-edu,  [[0, 0.0],[10500, 0.0],[14000, 4.0]]]        # https://huggingface.co/datasets/HuggingFaceFW/fineweb-edu
  #- [code_haskell, 0.0]       # From: https://huggingface.co/datasets/bigcode/the-stack-dedup
  
  #- [eai_med, 0.0]           # https://huggingface.co/datasets/EssentialAI/eai-taxonomy-med-w-fm
  

