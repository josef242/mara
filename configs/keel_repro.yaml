# ============================================================================
# KEEL Paper Faithful Reproduction — "Post-LayerNorm Is Back" (Chen & Wei 2026)
# Target: Section 5.4, Table 4 — FineWeb-EDU 10B tokens, 256L, 3B params
# Rig: rig-30 (8x3090)
# ============================================================================
# GOAL: Match paper EXACTLY. Zero innovations. This is a control experiment.
#
# What we're testing:
#   1. Is our KEEL implementation correct? (training dynamics should match paper)
#   2. Does vanilla KEEL solve gradient concentration at 256 layers?
#   3. Clean baseline before layering AWD/AdamC/creative data
#
# Paper results to match (Table 4, KEEL row, 10B tokens):
#   ARC-Easy: 58.8 | PIQA: 73.4 | HellaSwag: 53.8 | LAMBADA: 49.6
#   Winogrande: 56.0 | SciQ: 78.1 | Average: 61.5
# ============================================================================
run_name: keel-repro

# === TRAINING SETTINGS ===
# Paper S5.4: batch_size=256, seq_len=2048 -> 524,288 tokens/step
# 10B tokens / 524,288 = 19,073 steps
#
# 8x3090: B=4, GA=8 -> 8x4x2048x8 = 524,288  EXACT MATCH
# Alternative if memory allows: B=8, GA=4 -> same total
#
# CHANGED from yours: constant batch size (paper has no ramp)
ga_schedule:
  - [0, 524_288]
B: 4                               # CHANGED: was 12; conservative for 256 layers
T: 2048                            # MATCHES paper S5.4 (10B run uses 2048)
max_steps: 19_100                  # CHANGED: was 200k; ~19,073 steps for 10B tokens
eval_iters: 2
val_step: 100
save_step: 500

# === DATA TYPE ===
data_type: bf16
FSDP_param_dtype: bf16
FSDP_reduce_dtype: bf16
FSDP_buffer_dtype: bf16
reshard_after_forward: false

# === RESUME ===
resume_training: true
resume_step: 1_000
resume_data_reset: continue 

# === GRADIENT CLIPPING ===
# Paper S5.3: "Gradient clipping applied with maximum norm of 1.0"
clip_warmup: 1.0
clip_standard: 1.0

# === TOKENIZER ===
tok_kind: llama
tok_path: ../tokenizers/llama_tokenizer
special_tokens: ../../notebooks/datasets/tokenized/llama/tokenizer_config.json

# === MODEL ARCHITECTURE ===
# Paper Table 8, Section 5.4: 256 transformer layers, hidden=1024
# Paper Section 3: alpha = L where L = total sublayers (attn + ffn)
#   256 transformer layers x 2 = 512 sublayers -> alpha = 512
#
# Paper Section 3.1 Implementation Details:
#   - First attn + ffn layers: remove post-LN and alpha (degrade to Pre-LN blocks)
#   - All LN: learnable gamma, no bias (beta = 0)
#   - Init: N(0, 0.02^2)
#   - RoPE theta = 10000
#
# VERIFY: Does your use_keel implementation handle the first-layer exception?
#   Paper explicitly says first attn+ffn skip post-LN and alpha scaling.
#
use_keel: true
keel_alpha: 512                     # CHANGED: was 350; alpha = L = 256x2 = 512 sublayers
cfg_layers: 256                     # CHANGED: was 72; paper Table 4/8
cfg_heads: 16                       # CHANGED: was 14; paper Table 8
cfg_kv_heads: 8                     # CHANGED: was 14; paper Table 8 (GQA, not MHA)
cfg_embd: 1024                      # CHANGED: was 1344; paper Table 8
cfg_intermediate: 3072              # CHANGED: was 2240; paper Table 8
multiple_of: 128                    # 3072 / 128 = 24 (clean)
norm_eps: 1.0e-05                   # MATCHES paper Table 8
dropout: 0.0                        # MATCHES paper Table 8
use_activation_checkpointing: true  # Essential for 256 layers
qk_norm_mode: null                  # CHANGED: was "before_rope"; paper does NOT use QK norm
tie_word_embeddings: false          # Paper uses separate output head
rope_theta: 10000.0                 # CHANGED: was 500000; paper Table 8

# === COMPILATION ===
compile_model: true
compile_mode: default

# === LEARNING RATE SCHEDULE ===
# Paper S5.4: "2000-step linear warmup followed by cosine decay"
# Paper Table 4: KEEL best LR = 3.0e-3 on FineWeb-EDU 10B
#   (Tuned over {1.0, 1.5, 3.0, 4.5} x 10^-3)
# Paper S5.3: cosine decay minimum = 1.0e-7
#
# CHANGED: was "plateau" with dual-plateau; paper uses simple warmup+cosine
lr_schedule_type: "cosine"
max_lr: 3.0e-03                     # CHANGED: was 4.5e-3; paper Table 4 best
min_lr: 1.0e-07                     # CHANGED: was 4.5e-5; paper S5.3
warmup_steps: 2000                  # CHANGED: was 1500; paper S5.4

# === NO lr_mods ===
# Paper uses uniform LR across all layers.

# === OPTIMIZER ===
# Paper S5.3: "AdamW with beta1=0.9, beta2=0.95, weight decay 0.01"
#
# CHANGED: standard AdamW, not AdamC
optimizer_type: adamw               # CHANGED: was adamc_8bit
beta1: 0.9
beta2: 0.95

# === WEIGHT DECAY ===
# Paper S5.3: "weight decay of 0.01" — uniform, constant
#
# CHANGED: was 0.05 with per-group schedules; paper = flat 0.01
#weight_decay:
#  - [all, [[0, 0.01]]]
weight_decay: 0.01

# === NO ADAPTIVE WEIGHT DECAY ===
# Paper has no AWD / PID controller. Removed entirely.

# === DATA ===
# Paper S5.4: FineWeb-EDU dataset, 10B tokens
# CHANGED: was 67% creative mix; now 100% FineWeb-EDU
data_root_path: ../../notebooks/datasets/tokenized/llama/
groups:
  - [edufineweb_10BT, 100.0]

# === LOGGING ===
gen_log_file: gen_log.txt
train_log_file: train_log.txt
val_log_file: val_log.txt
server_port: 8888

# === CHECKPOINT PATHS ===
nas_root: ../ckpt/mara_fsdp2/                                   # Defaults to ./log/ if not specified
local_checkpoint_root: ~/checkpoints/                           # Defaults to ~/checkpoints/ if not specified

# ============================================================================
# CHANGE SUMMARY (your keel_repro.yaml -> paper-faithful config)
# ============================================================================
#
# ARCHITECTURE:
#   cfg_layers:       72 -> 256        (3.6x deeper)
#   cfg_embd:         1344 -> 1024     (narrower)
#   cfg_intermediate: 2240 -> 3072     (paper standard)
#   cfg_heads:        14 -> 16
#   cfg_kv_heads:     14 -> 8          (GQA instead of MHA)
#   keel_alpha:       350 -> 512       (alpha = L = 512 sublayers)
#   qk_norm_mode:     before_rope -> null
#   rope_theta:       500000 -> 10000
#
# OPTIMIZER:
#   optimizer_type:   adamc_8bit -> adamw
#   weight_decay:     0.05 (scheduled, per-group) -> 0.01 (flat)
#   adaptive_wd:      REMOVED entirely
#   lr_mods:          REMOVED entirely
#
# LR SCHEDULE:
#   lr_schedule_type: plateau (dual) -> cosine
#   max_lr:           4.5e-3 -> 3.0e-3
#   min_lr:           4.5e-5 -> 1.0e-7
#   warmup_steps:     1500 -> 2000
#
# DATA:
#   67% creative + 15% edu + 18% other -> 100% FineWeb-EDU
#
# TRAINING:
#   max_steps:        200,000 -> 19,100
#   B:                12 -> 4
#   ga:               ramping schedule -> fixed 524,288
#
# TOTAL PARAMS:       ~1.5B -> ~3.5B
#
# ============================================================================
# WHAT TO MONITOR
# ============================================================================
# 1. Loss curve shape — paper Fig 5a: KEEL starts higher, crosses Pre-LN mid-run
# 2. Gradient distribution — does alpha=512 prevent terminal concentration?
# 3. w_rms by layer — without AWD, do layers grow unbounded?
# 4. Final benchmarks vs Table 4 (average ~61.5)
#
# INTERPRETATION:
#   Loss matches paper -> Implementation correct, KEEL works as described
#   Gradient still concentrates -> Problem deeper than optimizer tricks
#   Loss diverges early -> Bug in KEEL impl (check alpha, first-layer exception)
#   Benchmarks close -> Clean baseline established for future experiments
#
# ============================================================================
# IMPLEMENTATION CHECKLIST (verify before launch)
# ============================================================================
# [ ] Forward: x_{l+1} = LN(alpha * x_l + F_l(LN(x_l)))
# [ ] alpha = keel_alpha (512), scalar multiply on residual
# [ ] First layer exception: first attn + first ffn use Pre-LN (no post-LN, no alpha)
# [ ] All LayerNorm: RMSNorm with learnable gamma, NO bias (beta=0)
# [ ] Weight init: N(0, 0.02^2) — paper Table 8
# [ ] Two distinct LN per sublayer: inner LN on F input, outer LN post-addition
# [ ] AdamW is standard (not 8-bit, not AdamC)
# [ ] edufineweb_10BT has at least 10B tokens available
# ============================================================================