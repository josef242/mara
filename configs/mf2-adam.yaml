# Configuration for a KEEL-based ultra-deep model (small test)
run_name: mf2-adam

# Training settings
ga_schedule:
  - [0, 350_000]
  - [5_000, 700_000]
  - [10_000, 1_500_000]
B: 6                              # Batch size per GPU
T: 2048                           # Context size (sequence length)
max_steps: 200_000                # Maximum number of training steps
eval_iters: 2                     # Number of iterations for evaluation x ranks
val_step: 100                     # Validation step frequency in steps
save_step: 500                    # Checkpoint saving frequency in steps

# Data type settings
data_type: bf16
FSDP_param_dtype: bf16
FSDP_reduce_dtype: bf16
FSDP_buffer_dtype: bf16
reshard_after_forward: false

# Resume training settings
resume_training: true
resume_step: 9_500
resume_data_reset: continue       # Modes are: continue (no reset), soft (reset pct window - change in pct), hard (reset all)

# Gradient clipping
clip_warmup: 1.0
clip_standard: 1.0                # for bf16 1.0 is recommended instead of the old 0.3-0.7

# Tokenizer settings
tok_kind: llama
tok_path: ../tokenizers/llama_tokenizer
special_tokens: ../../notebooks/datasets/tokenized/llama/tokenizer_config.json  # Optional: add conversation special tokens

# Model architecture
use_keel: true                    # Enable KEEL ultra-deep architecture
                          # smaller alpha makes the output layers grow faster
keel_alpha: 200                  # null = layers * 2.0; otherwise, specify a custom alpha value (num_layers * n = alpha)
cfg_layers: 72
cfg_heads: 14
cfg_kv_heads: 14
cfg_embd: 1344
cfg_intermediate: 2240
multiple_of: 128
norm_eps: 1.0e-05
dropout: 0.0
use_activation_checkpointing: true
qk_norm_mode: "before_rope"       # null, "before_rope", "after_rope_legacy", "after_rope_fixed"
tie_word_embeddings: false         # Whether to tie word embeddings - false gives a small boost in quality but increases model size
rope_theta: 500000.0              # # NEW SETTING: RoPE base frequency (higher = longer context support)

# Compilation settings
compile_model: true
compile_mode: default

# Learning rate schedule - Conservative Plateau with adjusted max_lr
lr_schedule_type: "plateau"       
max_lr: 4.5e-03                   
min_lr: 4.5e-05                   # 1% floor
warmup_steps: 1500                # Match paper's deep runs

decay_to_first_plat_pct: 0.08     
first_plat_lr: 0.5e-03            # 
first_plat_len_pct: 0.50          

decay_to_second_pct: 0.10         
second_plat_lr: 2.0e-04           # Refinement
second_plat_len_pct: 0.20

lr_mods:
  - [emb,  [[0, 1.0]]]                          # It's already at equilibrium, don't touch it
  - [out,  [[0, 0.2]]]                          # Immediate brake — it's already in runaway
  - [0, 70, all, [[0, 1.0]]]                    # Layers are fine
  - [71, 71, all, [[0, 0.7], [9500, 0.7], [9600, 0.5]]]                   # L71 terminal spike — cool it down

# Optimizer settings
optimizer_type: adamc_8bit
beta1: 0.9
beta2: 0.95

weight_decay:
  - [all, 0.1]
  - [out, 0.1]
  - [emb, 0.1]

adaptive_wd:
  enabled: true
  check_interval: 50
  groups:
    - target: [0, 71]
      sublayer: all
      metric: w_rms_target
      target_value: 0.7
      min_wd_multiplier: 0.2
      max_wd_multiplier: 7.0
      kp: 90.0                       # High P: react immediately when w_rms crosses target
      ki: 50.0                        # High I: eliminate steady-state offset fast
      kd: 0.0                        # No D: w_rms is slow-moving, braking is counterproductive
      pid_smoothing: 0.0             # No smoothing: w_rms is stable, react to raw signal

    - target: out
      metric: w_rms_target
      target_value: 0.7
      min_wd_multiplier: 0.2
      max_wd_multiplier: 7.0
      kp: 90.0
      ki: 50.0
      kd: 0.0
      pid_smoothing: 0.0

    - target: emb
      metric: w_rms_target
      target_value: 0.7
      min_wd_multiplier: 0.2
      max_wd_multiplier: 7.0
      kp: 90.0                       # Slightly gentler — embeddings are discrete/shared
      ki: 50.0
      kd: 0.0
      pid_smoothing: 0.0

data_root_path: ../../notebooks/datasets/tokenized/llama/
groups:
  - [stories, [[0,22.0],[10_500, 22.0], [11_500, 23.0]]]               #
  - [ao3, 22.0]                   #
  - [books, 22.0]                 #
  - [edufineweb_10BT, 15.0]       #
  - [preselect, 10.0]             #
  - [mid_smoltalk, 8.0]           #
  - [mid_mmlu, [[0,1.0],[10_500, 1.0], [11_500, 0.0]]]               #
# - [mid_words, 0.0]              # Danger will robinson!

# Logging settings
gen_log_file: gen_log.txt         # Will be saved in nas_root
train_log_file: train_log.txt     # Will be saved in nas_root
val_log_file: val_log.txt         # Will be saved in nas_root
# server_host: localhost          # Will be derived from ddp
server_port: 8888

# Checkpoint Paths
nas_root: ../ckpt/mara_fsdp2/                                   # Defaults to ./log/ if not specified
local_checkpoint_root: ~/checkpoints/                           # Defaults to ~/checkpoints/ if not specified