# picket-ctrl — head-hygiene CANARY, CONTROL arm (head hygiene OFF).
#
# A picket ship is the fleet's small fast early-warning scout: this is a small, fast KEEL run that
# canaries the dn4 head-hygiene levers on rig-31 (parallel to dn3 on the big rig) BEFORE we commit a
# big rig to the full dn4 marathon. A/B with picket-hyg, which is byte-identical EXCEPT it turns on
# head_gauge_projection. Same model, same data, same seed-path -> the ONLY variable is the head lever.
#
# CONTROL (this file): NO head hygiene. The untied LM head accumulates the CE-invisible common-mode
# gauge unchecked (the DN2 head-growth story, at small scale). Watch raw head ||W|| balloon while the
# centered geometry (logZ_c / ||W_c|| / eff_rank_c) tells the real story. This is the "before".
#
# Hardware: rig-31, ~4 GPUs (3060/3060Ti). ~220M params, fits 8-12GB sharded. Fresh from scratch.
run_name: picket-ctrl

# Modest GA so steps stay frequent (good diagnostic granularity for watching the head).
ga_schedule:
  - [0, 65_536]
  - [4_000, 131_072]
B: 4
T: 2048
max_steps: 15_000
eval_iters: 2
val_step: 50          # frequent: we want a fine-grained head-geometry trace
save_step: 500

data_type: bf16
FSDP_param_dtype: bf16
FSDP_reduce_dtype: bf16
FSDP_buffer_dtype: bf16
reshard_after_forward: false

resume_training: false

clip_warmup: 1.0
clip_standard: 1.0
track_gpm: true
track_clip_groups: true

# Small KEEL: deep-ish + narrow so it's fast on 3060s but still ultra-deep in style.
use_keel: true
keel_alpha: null
cfg_layers: 24
cfg_heads: 12
cfg_kv_heads: 6          # GQA 2:1
cfg_embd: 768
cfg_intermediate: 2048   # ~2.66x embd, multiple of 128
multiple_of: 128
norm_eps: 1.0e-05
dropout: 0.0
use_activation_checkpointing: true
qk_norm_mode: "before_rope"
tie_word_embeddings: false   # UNTIED — required for the head-gauge story (and for the head levers)
rope_theta: 500_000.0
moe_enabled: false

compile_model: true
compile_mode: default

lr_schedule_type: "cosine"
max_lr: 3.5e-04
min_lr: 3.5e-05
warmup_steps: 1000

optimizer_type: normuon_fsdp2
beta1: 0.9
beta2: 0.95
weight_decay: 0.02       # DN2-like; body grows naturally (no tangent projection — head test, not body)
muon_momentum: 0.95
muon_ns_steps: 5
normuon_beta2: 0.99
muon_adam_state_dtype: fp32   # required if/when head_gauge_projection or centered z-loss are enabled

output_lr_batch_adjust:       # DN2 had this (head-LR pacing, NOT a brake); keep so the arms match DN2
  base_mult: 0.8
  exponent: 0.3

# ===== head-hygiene levers: BOTH OFF in the control arm =====
# head_gauge_projection: (absent) -> OFF
# z_loss:                (absent) -> OFF
row_center_head:
  enabled: false              # legacy path; off (mutually exclusive with head_gauge anyway)

transition_health_guard: true
health_guard_warmup_steps: 150

tok_kind: llama
tok_path: ../tokenizers/llama_tokenizer
special_tokens: ../../notebooks/datasets/tokenized/llama/tokenizer_config.json
data_root_path: ../../notebooks/datasets/tokenized/llama/
groups:
  - [stories, [[0, 34.0]]]
  - [ao3,     [[0, 33.0]]]
  - [books,   [[0, 33.0]]]

gen_log_file: gen_log.txt
train_log_file: train_log.txt
val_log_file: val_log.txt
server_port: 8901

nas_root: /home/josef/brainbox/checkpoints/current/
local_checkpoint_root: ~/checkpoints/
