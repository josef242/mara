# Configuration for a KEEL-based ultra-deep model. Test impact of low learning rate.
run_name: scs_pilot_1

# Training settings
ga_schedule:
  - [0, 150_000]
  - [4_000, 250_000]
  - [8_000, 500_000]
  - [17_000, 1_000_000]
  - [20_000, 2_000_000]
  - [24_000, 3_000_000]
B: 8                          # Batch size per GPU
T: 2048                       # Context size (sequence length)
max_steps: 200_000            # Maximum number of training steps
eval_iters: 2                 # Number of iterations for evaluation x ranks
val_step: 100                 # Validation step frequency in steps
save_step: 500                # Checkpoint saving frequency in steps

# Data type settings
data_type: bf16
FSDP_param_dtype: bf16
FSDP_reduce_dtype: bf16
FSDP_buffer_dtype: bf16
reshard_after_forward: false

# Resume training settings
resume_training: false
resume_step: 0
resume_data_reset: continue         # Modes are: continue (no reset), soft (reset pct window - change in pct), hard (reset all)

# Gradient clipping
clip_warmup: 1.0
clip_standard: 1.0                # for bf16 1.0 is recommended instead of the old 0.3-0.7

# Tokenizer settings
tok_kind: llama
tok_path: ../tokenizers/llama_tokenizer
special_tokens: ../../notebooks/datasets/tokenized/llama/tokenizer_config.json  # Optional: add conversation special tokens

# Model architecture
use_keel: true                    # Enable KEEL ultra-deep architecture
keel_alpha: null                  # Use default alpha value of layers * 2.0
cfg_layers: 70
#cfg_layers: 72
cfg_heads: 14
cfg_kv_heads: 14                  # NEW SETTING
cfg_embd: 1344
cfg_intermediate: 2240
multiple_of: 128
norm_eps: 1.0e-05
dropout: 0.0
use_activation_checkpointing: true
qk_norm_mode: "before_rope"       # None, "before_rope", "after_rope_legacy", "after_rope_fixed"
tie_word_embeddings: false         # Whether to tie word embeddings - false gives a small boost in quality but increases model size
rope_theta: 100000.0              # # NEW SETTING: RoPE base frequency (higher = longer context support)

# Compilation settings
compile_model: true
compile_mode: default

# Learning rate schedule - Conservative Plateau with adjusted max_lr
lr_schedule_type: "cosine"
max_lr: 3.5e-04                   
min_lr: 3.5e-05                   # 1% floor
warmup_steps: 1500                # Match paper's deep runs

# Optimizer settings
optimizer_type: normuon_fsdp2
beta1: 0.9
beta2: 0.95
weight_decay: 0.02                 # Note: with KEEL, weight decay should be used carefully, they set it to 0.01 in the paper
muon_momentum: 0.95
muon_ns_steps: 5
normuon_beta2: 0.99               # 0.95 - Aggressive, ~20 step window | 0.99 - Moderate, ~100 step window | 0.999 - Conservative, ~1000 step window

# Scaffolded Cascading Supervision (SCS) — Pilot 1
# Aux heads at L18/L35/L52 drive partial-depth training in cascading phases.
# While any tap is at λ >= 1.0 the trainer truncates forward+backward at that
# depth, skips the main LM head, and uses the deepest active aux head's CE as
# the effective LM loss. Each new compartment ramps from new_layer_lr_multiplier
# to 1.0 over new_layer_warmup_steps. Cascade-complete (no tap at λ >= 1.0)
# fires the main head and final-layer compartment all at once.
auxiliary_heads:
  enabled: true
  share_lm_head: false
  compute_inactive_layers: false     # SCS: scaffold mode whenever any tap is at λ >= 1.0
  new_layer_warmup_steps: 500        # LR warmup window when a new compartment activates
  new_layer_lr_multiplier: 0.1       # initial LR multiplier, ramps linearly to 1.0
  heads:
    - layer: 18
      weight: [[0, 1.0], [6500, 1.0], [9750, 0.0]]
    - layer: 35
      weight: [[0, 0.0], [6500, 1.0], [9750, 1.0], [12250, 0.0]]
    - layer: 52
      weight: [[0, 0.0], [9750, 1.0], [12250, 1.0], [13000, 0.1]]

data_root_path: ../../notebooks/datasets/tokenized/llama/
groups:
  - [stories, 50.0]             #
  - [ao3, 50.0]                 #

# Logging settings
gen_log_file: gen_log.txt           # Will be saved in nas_root
train_log_file: train_log.txt       # Will be saved in nas_root
val_log_file: val_log.txt           # Will be saved in nas_root
server_port: 8888

# Checkpoint Paths
nas_root: /home/josef/brainbox/checkpoints/current/             # Defaults to ./log/ if not specified
local_checkpoint_root: ~/checkpoints/                           # Defaults to ~/checkpoints/ if not specified
