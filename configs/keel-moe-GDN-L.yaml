# MoE + KEEL
run_name: keel-moe-GDN-L

# Training settings
ga_schedule:
  - [0, 125_000]
  - [2_000, 250_000]
  - [4_000, 500_000]
  - [5_000, 750_000]
  - [6_000, 1_000_000]
  - [10_000, 1_500_000]
  - [12_000, 2_000_000]
  - [14_000, 3_000_000]
  - [16_000, 4_000_000]

B: 4                          # Reduced from 4 for MoE memory
T: 4096                       # Reduced from 4096 for MoE memory
max_steps: 200_000                # Quick functional test
eval_iters: 2                 # Number of iterations for evaluation x ranks
val_step: 100                  # Frequent validation to verify loss decreases
save_step: 250                # One checkpoint mid-run

# Data type settings
data_type: bf16
FSDP_param_dtype: bf16
FSDP_reduce_dtype: bf16
FSDP_buffer_dtype: bf16
reshard_after_forward: true

# Resume training settings
resume_training: true
resume_step: 3_750
resume_data_reset: continue

# Gradient clipping
clip_warmup: 1.0
clip_standard: 1.0

# Tokenizer settings
tok_kind: tiktoken
tok_path: cl100k_base
special_tokens: ../../notebooks/datasets/tokenized/cl100k/tokenizer_config.json  # Optional: add conversation special tokens

# Model architecture
use_keel: true
keel_alpha: null                # default: L*2
#cfg_layers: 64
cfg_layers: 60
cfg_heads: 32
cfg_kv_heads: 32                # GQA heads
cfg_embd: 2048                  # Must be divisible by 8 (world size) for Muon
cfg_intermediate: null          # Dense layer FFN hidden dim (divisible by 7)
norm_eps: 1.0e-05
dropout: 0.0
use_activation_checkpointing: true
qk_norm_mode: "before_rope"
tie_word_embeddings: true
rope_theta: 500_000.0

# MoE configuration — EP=7 (one expert per GPU)
moe_enabled: true
moe_num_experts: 16             # Must be divisible by ep_degree
moe_top_k: 2                  # Each token routed to 2 experts
moe_num_shared_experts: 1      # 1 shared expert (always active)
moe_score_func: sigmoid        # DeepSeek-style sigmoid scoring
moe_load_balance_coeff: 0.001  # Aux-loss-free load balancing
moe_n_dense_layers: 10          # First layers stays dense
moe_n_tail_dense_layers: 10     # Last layer stays dense
moe_interleave_step: 1         # Every remaining layer is MoE
moe_inner_dim: 1024            # Expert hidden dim (half of cfg_intermediate, divisible by 7)
ep_degree: null                # Expert Parallel: Defaults to world size. Num Experts must be divisible by ep_degree.
moe_shared_overlap: false      # Optimization for cards with more SMs
moe_aux_balance_coeff: 0.0001   # DeepSeek-V3-style balance loss (factor * E * sum(f_i * P_i)) that backpropagated through the router, giving it a direct gradient signal to diversify
moe_bias_before_score: false    # DO NOT USE! expert_bias added to logits before sigmoid, shifting the sigmoid's decision boundary and affecting gradient magnitude
moe_capacity_factor: 1.10       # Capacity factor for MoE layers (default 0.0, >1.0 allows more tokens per expert but increases memory)

# GDN (Gated DeltaNet) hybrid attention
gdn_enabled: true
gdn_interleave_step: 4          # Every 4th layer is gated-softmax attention, rest are GDN (3:1 ratio)
n_gdn_heads: 16                  # 8 heads × 256 head_dim = 2048 (matches model dim)
gdn_head_dim: 128               # q/k head dim — larger is better for delta rule (state is head_dim²)
gdn_v_expand: 2.0               # v_dim = head_dim × expand = 512 per head, 4096 total
gdn_short_conv_kernel: 4        # Short convolution for local context
gdn_mode: chunk                 # 'chunk' for training, 'fused_recurrent' for inference

# Compilation settings — per-submodule compile (experts skipped, rest compiled)
compile_model: true
compile_mode: default

# # Learning rate schedule — Cosine
# lr_schedule_type: "cosine"
# max_lr: 3.0e-04
# min_lr: 3.0e-05
# warmup_steps: 1000

# Learning rate schedule — Plateau (cosine-equivalent energy, ~92%)
lr_schedule_type: "plateau"
max_lr: 3.0e-04
min_lr: 3.0e-05
warmup_steps: 1000
# First plateau — stable exploration (67% of peak)
decay_to_first_plat_pct: 0.05       # 10k steps to decay (1k to 11k)
first_plat_lr: 2.0e-04              # 67% of max — main learning phase
first_plat_len_pct: 0.45            # 90k steps at plateau (11k to 101k)
# Second plateau — refinement (20% of peak)
decay_to_second_pct: 0.12           # 24k steps to decay (101k to 125k)
second_plat_lr: 6.0e-05             # 20% of max — fine refinement
second_plat_len_pct: 0.25           # 50k steps at plateau (125k to 175k)
                                    # Remaining 13%: final decay to min_lr (175k to 200k)

## Optimizer settings
#optimizer_type: normuon_fsdp2
#beta1: 0.9
#beta2: 0.95
#weight_decay: 0.1
#muon_momentum: 0.95
#muon_ns_steps: 5
#normuon_beta2: 0.99

# === OPTIMIZER ===
# Paper S5.3: "AdamW with beta1=0.9, beta2=0.95, weight decay 0.01"
optimizer_type: adamw               # CHANGED: was adamc_8bit
beta1: 0.9
beta2: 0.95
weight_decay: 0.01  # Paper S5.3: "weight decay of 0.01" — uniform, constant

# Data configuration
data_root_path: ../../notebooks/datasets/tokenized/cl100k/
